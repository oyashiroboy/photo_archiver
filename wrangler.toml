#:schema node_modules/wrangler/config-schema.json
# Base config. `npm run prepare:wrangler` generates `.wrangler.generated.toml`
# with `name` from `config/gallery.config.json` (deploy.workerName).
name = "photo-archive-base"
main = "src/index.ts"
compatibility_date = "2024-12-18"

# 全リクエストをWorker経由にする（認証のバイパスを防止）
# https://developers.cloudflare.com/workers/static-assets/binding/#run_worker_first
[assets]
directory = "./static"
binding = "ASSETS"
run_worker_first = true

# パスワードは wrangler secret put GALLERY_PASSWORD で設定
# ローカル開発時は .dev.vars に GALLERY_PASSWORD=your-password と記載
